<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng ký | StudyFlow Pro</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS CHUNG -->
    <link rel="stylesheet" href="style.css" />

    <style>
      /* =========================
       REGISTER PAGE
    ========================= */

      .auth-page {
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        position: relative;

        overflow: hidden;
      }

      .register-card {
        width: 480px;

        padding: 50px 42px;

        border-radius: 35px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(20px);

        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);

        position: relative;

        z-index: 2;

        animation: fadeUp 1s ease;
      }

      /* ICON */

      .auth-logo {
        width: 90px;
        height: 90px;

        margin: auto;

        border-radius: 25px;

        display: flex;
        align-items: center;
        justify-content: center;

        background: linear-gradient(135deg, #ec4899, #7c3aed);

        font-size: 42px;

        margin-bottom: 28px;

        box-shadow: 0 0 35px rgba(236, 72, 153, 0.5);
      }

      .auth-brand {
        text-align: center;

        font-size: 22px;

        font-weight: 600;

        margin-bottom: 10px;
      }

      .auth-title {
        text-align: center;

        font-size: 52px;

        line-height: 1.2;

        margin-bottom: 12px;
      }

      .auth-subtitle {
        text-align: center;

        color: #cbd5e1;

        margin-bottom: 40px;

        font-size: 18px;
      }

      /* FORM */

      .form-group {
        margin-bottom: 26px;
      }

      .form-group label {
        display: block;

        margin-bottom: 10px;

        font-size: 16px;
      }

      .input-box {
        width: 100%;

        height: 62px;

        padding: 0 22px;

        border-radius: 18px;

        border: 1px solid rgba(255, 255, 255, 0.12);

        background: rgba(0, 0, 0, 0.35);

        color: white;

        font-size: 17px;

        outline: none;

        transition: 0.35s;
      }

      .input-box:focus {
        border-color: #c084fc;

        box-shadow: 0 0 20px rgba(192, 132, 252, 0.35);
      }

      .input-box::placeholder {
        color: #64748b;
      }

      /* BUTTON */

      .auth-btn {
        width: 100%;

        height: 62px;

        border: none;

        border-radius: 18px;

        background: linear-gradient(135deg, #ec4899, #7c3aed);

        color: white;

        font-size: 18px;

        font-weight: 600;

        cursor: pointer;

        margin-top: 12px;

        transition: 0.35s;
      }

      .auth-btn:hover {
        transform: translateY(-4px) scale(1.02);

        box-shadow: 0 0 35px rgba(236, 72, 153, 0.5);
      }

      /* BACK HOME */

      .back-home {
        position: absolute;

        top: 30px;
        left: 30px;

        padding: 14px 24px;

        border-radius: 16px;

        text-decoration: none;

        color: white;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(10px);

        transition: 0.35s;

        z-index: 10;
      }

      .back-home:hover {
        transform: translateY(-4px);

        background: rgba(255, 255, 255, 0.12);
      }

      /* FOOTER */

      .auth-footer {
        margin-top: 35px;

        text-align: center;

        color: #cbd5e1;
      }

      .auth-footer a {
        color: #f9a8d4;

        text-decoration: none;

        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <!-- NỀN -->
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>

    <!-- PARTICLE -->
    <div id="particles"></div>

    <!-- BACK -->
    <a href="home.html" class="back-home"> ← Quay lại trang chủ </a>

    <!-- REGISTER -->

    <section class="auth-page">
      <div class="register-card">
        <!-- LOGO -->

        <div class="auth-logo">🚀</div>

        <div class="auth-brand">StudyFlow Pro</div>

        <h1 class="auth-title">Tạo tài khoản mới</h1>

        <p class="auth-subtitle">Precision Engineering for High Achievers.</p>

        <!-- FORM -->

        <form>
          <!-- NAME -->

          <div class="form-group">
            <label>Họ và tên</label>

            <input type="text" class="input-box" placeholder="Nhập họ và tên" />
          </div>

          <!-- EMAIL -->

          <div class="form-group">
            <label>Email</label>

            <input
              type="email"
              class="input-box"
              placeholder="name@example.com"
            />
          </div>

          <!-- PASSWORD -->

          <div class="form-group">
            <label>Mật khẩu</label>

            <input
              type="password"
              class="input-box"
              placeholder="Tạo mật khẩu mạnh"
            />
          </div>

          <!-- BUTTON -->

          <button class="auth-btn">Đăng Ký</button>
        </form>

        <!-- FOOTER -->

        <div class="auth-footer">
          Đã có tài khoản?

          <a href="login.html"> Đăng nhập </a>
        </div>
      </div>
    </section>

    <!-- PARTICLES -->

    <script>
      const particles = document.getElementById("particles");

      for (let i = 0; i < 40; i++) {
        const particle = document.createElement("div");

        particle.classList.add("particle");

        particle.style.left = Math.random() * 100 + "vw";

        particle.style.top = Math.random() * 100 + "vh";

        particle.style.animationDuration = Math.random() * 10 + 5 + "s";

        particle.style.opacity = Math.random();

        particle.style.width = Math.random() * 5 + 3 + "px";

        particle.style.height = particle.style.width;

        particles.appendChild(particle);
      }
    </script>
  </body>
</html>
