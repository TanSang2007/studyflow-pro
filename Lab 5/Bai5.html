<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinh nghiệm làm việc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background-color: white;
            width: 600px;
            padding: 25px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h2 {
            color: #007bff;
            font-size: 18px;
            margin: 0;
            border-left: 4px solid red;
            padding-left: 10px;
        }

        .header span {
            color: #888;
            font-style: italic;
            font-weight: normal;
            font-size: 14px;
        }

        .btn-toggle {
            border: 1px solid #ccc;
            background: white;
            padding: 2px 10px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
        }

        .instruction {
            font-size: 13px;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .form-group {
            display: flex;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .form-group label {
            width: 150px;
            text-align: right;
            padding-right: 20px;
            font-size: 14px;
            color: #333;
            margin-top: 8px;
        }

        .form-group label span {
            color: red;
        }

        .form-control {
            flex: 1;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .row-flex {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .salary-group {
            display: flex;
            gap: 10px;
        }

        .salary-group select {
            width: 80px;
        }

        .btn-group {
            margin-left: 150px;
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save { background-color: #e51f1f; }
        .btn-cancel { background-color: #888; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h2>Kinh nghiệm làm việc <span>(bắt buộc)</span></h2>
        <button class="btn-toggle">Rút gọn <i class="fas fa-chevron-up"></i></button>
    </div>

    <p class="instruction">Hãy liệt kê những công việc, nhiệm vụ mà bạn đã từng đảm nhận và thực hiện. Chú ý liệt kê kinh nghiệm làm việc từ thời gian gần đây nhất trở về trước.</p>

    <form>
        <div class="form-group">
            <label>Công ty <span>*</span></label>
            <div class="form-control"><input type="text"></div>
        </div>

        <div class="form-group">
            <label>Chức danh <span>*</span></label>
            <div class="form-control"><input type="text"></div>
        </div>

        <div class="form-group">
            <label>Thời gian làm việc <span>*</span></label>
            <div class="form-control row-flex">
                từ 
                <select><option>Tháng</option></select>
                <select><option>Năm</option></select>
                đến
                <select><option>Tháng</option></select>
                <select><option>Năm</option></select>
            </div>
        </div>

        <div class="form-group">
            <label>Mức lương</label>
            <div class="form-control salary-group">
                <select><option>VND</option></select>
                <input type="text">
            </div>
        </div>

        <div class="form-group">
            <label>Mô tả công việc <span>*</span></label>
            <div class="form-control"><textarea></textarea></div>
        </div>

        <div class="form-group">
            <label>Thành tích đạt được</label>
            <div class="form-control"><textarea></textarea></div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Lưu</button>
            <button type="button" class="btn btn-cancel"><i class="fas fa-times"></i> Không lưu</button>
        </div>
    </form>
</div>

</body>
</html>
