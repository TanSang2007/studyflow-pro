<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2: Link liên kết</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background-color: #2c5171;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .dropbtn::after {
            content: " ▾";
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 250px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 5px;
        }
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #f1f1f1;
        }
        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
            color: #000;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .dropbtn {
            background-color: #1e3a52;
        }
    </style>
</head>
<body>
<div class="dropdown">
        <button class="dropbtn">Link liên kết</button>
        <div class="dropdown-content">
            <a href="http://vku.udn.vn/" target="_blank">Trường ĐH CNTT&TT Việt Hàn</a>
            <a href="https://www.24h.com.vn/" target="_blank">Tin tức 24h</a>
            <a href="https://vnexpress.net/" target="_blank">Tin tức Vietnamnet (VnExpress)</a>
            <a href="https://genk.vn/" target="_blank">Tin công nghệ</a>
        </div>
    </div>

</body>
</html>
