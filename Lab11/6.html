<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("nhập vào hệ số của x^2"))
        let b=parseInt(prompt("nhập vào hệ số của x"))
        let c=parseInt(prompt("nhập vào hệ số tự do"))
        let delta=b*b-4*a*c;
        if(delta>0){
            let x1=(-b-Math.sqrt(delta))/2*a;
            let x2=(-b+Math.sqrt(delta))/2*a;
            document.write("x1="+x1+"<br>")
            document.write("x2="+x2+"<br>")
        }
        else if(delta===0){
            document.write("x="+ (-b/2*a))
        }
        else{
            document.write("ko có nghiệm")
        }
    </script>
</body>
</html>
