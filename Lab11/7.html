<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("nhập vào số thứ nhất"))
        let b=parseInt(prompt("nhập số thứ 2"))
        let sum=parseInt(prompt("nhập kết quả của "+a+" + "+"b"+" = "))
        if(sum===(a+b)) alert("correct")
        else alert("uncorrect") 
    </script>
</body>
</html>
